<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* ГИФ ФОН */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* затемнение */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ФОТО */
.avatar {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
    transition: 0.3s;
}

.avatar:hover {
    transform: scale(1.07);
    box-shadow: 0 0 50px #7b2ff7, 0 0 100px #7b2ff7;
}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <a href="https://twitch.tv/ay3ent" target="_blank">
        <img src="photo.jpg" class="avatar">
    </a>
</div>

</body>
</html>
