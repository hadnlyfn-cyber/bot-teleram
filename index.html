<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family:"Bungee", sans-serif;
    cursor:none;
}

/* CURSOR */
.cursor{
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#7b2ff7;
    pointer-events:none;
    transform:translate(-50%,-50%);
    box-shadow:0 0 20px #7b2ff7;
}

/* INTRO */
.intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    z-index:999;
    transition:1s;
}

.main{opacity:0;transition:1.5s;}

.background{
    position:fixed;
    width:110%;
    height:110%;
    background:url('bg.gif') center/cover no-repeat;
    z-index:-2;
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* CONTENT */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.avatar{
    width:140px;
    height:140px;
    border-radius:50%;
    box-shadow:0 0 30px #7b2ff7;
}

.typing{color:white;margin:10px 0;}
.views{color:#aaa;}

.buttons{display:flex;flex-direction:column;gap:18px;}

.btn-row{display:flex;align-items:center;gap:12px;}

.btn{
    padding:10px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    transition:0.25s;
}

.btn img{width:55px;border-radius:12px;}

.btn-text{
    color:white;
    opacity:0;
    transform:translateX(-10px);
    transition:0.3s;
}

.btn-row:hover .btn-text{opacity:1;transform:translateX(0);}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #7b2ff7;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    width:340px;
    padding:18px;
    border-radius:25px;
    background:rgba(20,20,20,0.35);
    backdrop-filter:blur(20px);
}

/* PLAY */
.play-btn{
    width:65px;height:65px;border-radius:50%;
    background:#7b2ff7;color:white;border:none;
    font-size:22px;display:block;margin:auto;
}

/* PROGRESS */
.progress-container{
    width:100%;height:4px;
    background:rgba(255,255,255,0.2);
    margin-top:15px;
    cursor:pointer;
}

#progressBar{
    height:100%;width:0%;
    background:#7b2ff7;
}

/* VISUALIZER */
.visualizer{
    display:flex;
    justify-content:center;
    gap:3px;
    margin-top:10px;
}

.bar{
    width:4px;
    height:10px;
    background:#7b2ff7;
}

/* TIME */
.time{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="main" id="main">

<canvas id="particles"></canvas>

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="typing" id="typing"></div>

<div class="views" id="views">👁 0</div>

<div class="buttons">
<div class="btn-row">
<a href="#" class="btn"><img src="twitch2.png"></a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="#" class="btn"><img src="telegram.png"></a>
<span class="btn-text">telegram</span>
</div>
</div>

</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="visualizer" id="visualizer"></div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<audio id="music" src="music.mp3"></audio>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"boty-b7a7f.firebaseapp.com",
  databaseURL:"https://boty-b7a7f-default-rtdb.firebaseio.com/"
});

const db=getDatabase(app);
const r=ref(db,"views");

get(r).then(s=>set(r,(s.val()||0)+1));
onValue(r,s=>views.innerText="👁 "+s.val());
</script>

<script>
let music=document.getElementById("music");
let playBtn=document.getElementById("playBtn");

/* ENTER + MUSIC */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;
setTimeout(()=>intro.remove(),1000);

music.play().then(()=>playBtn.innerHTML="❚❚");
};

/* PLAYER */
playBtn.onclick=()=>{
if(music.paused){music.play();playBtn.innerHTML="❚❚";}
else{music.pause();playBtn.innerHTML="▶";}
};

/* VISUALIZER */
let vis=document.getElementById("visualizer");
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="bar";
vis.appendChild(b);
}

setInterval(()=>{
if(!music.paused){
document.querySelectorAll(".bar").forEach(b=>{
b.style.height=(5+Math.random()*25)+"px";
});
}
},120);

/* TYPING */
let w=["ay3ent...","streamer...","developer..."];
let i=0,j=0;
function t(){
typing.innerText=w[i].slice(0,j++);
if(j>w[i].length){j=0;i=(i+1)%w.length;}
setTimeout(t,150);
}
t();

/* CURSOR */
document.onmousemove=e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
};

/* PARTICLES */
let c=document.getElementById("particles");
let ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<50;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#7b2ff7";
p.forEach(pt=>{
ctx.fillRect(pt.x,pt.y,2,2);
pt.y+=0.3;
if(pt.y>c.height) pt.y=0;
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
