<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
}

/* CURSOR */
.cursor{
position:fixed;
width:18px;
height:18px;
border-radius:50%;
background:#7b2ff7;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 25px #7b2ff7;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:opacity 1s;
}

/* BG */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
}

/* GLASS */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(123,47,247,0.35);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:1.5s;
}

/* TEXT */
.typing{
color:white;
margin-bottom:10px;
height:20px;
}

/* AVATAR */
.avatar-wrap{
position:relative;
width:150px;
height:150px;
}
.avatar{
width:100%;
height:100%;
border-radius:50%;
z-index:2;
position:relative;
}
#circleVis{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* BUTTONS */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}
.btn-row{
display:flex;
align-items:center;
gap:10px;
}
.btn{
display:inline-flex;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
transition:0.25s;
text-decoration:none;
}
.btn img{
width:50px;
border-radius:10px;
}
.btn-text{
color:white;
opacity:0;
transform:translateX(-10px);
transition:0.3s;
}
.btn-row:hover .btn-text{
opacity:1;
transform:translateX(0);
}
.btn:hover{
transform:scale(1.07);
box-shadow:0 0 20px #7b2ff7;
}

/* PLAYER */
.player{
position:absolute;
bottom:20px;
width:80%;
}
.play-btn{
width:60px;
height:60px;
border-radius:50%;
border:none;
background:#7b2ff7;
color:white;
font-size:20px;
display:block;
margin:auto;
cursor:pointer;
}

/* PROGRESS */
.progress-container{
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
margin-top:10px;
cursor:pointer;
}
#progressBar{
height:100%;
width:0%;
background:#7b2ff7;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
font-size:11px;
color:#aaa;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<div id="typing" class="typing"></div>

<div class="avatar-wrap">
<canvas id="circleVis"></canvas>
<img src="photo.jpg" class="avatar">
</div>

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

/* CURSOR SMOOTH */
const cursor = document.getElementById("cursor");
let x=0,y=0,tx=0,ty=0;

document.addEventListener("mousemove",e=>{
tx=e.clientX;
ty=e.clientY;
});

function loop(){
x+=(tx-x)*0.2;
y+=(ty-y)*0.2;
cursor.style.left=x+"px";
cursor.style.top=y+"px";
requestAnimationFrame(loop);
}
loop();

/* TYPING */
const typing=document.getElementById("typing");
let words=["ay3ent","streamer","developer"];
let i=0,j=0;

(function type(){
typing.innerHTML=words[i].slice(0,j)+"|";
j++;
if(j>words[i].length+3){
j=0;
i=(i+1)%words.length;
}
setTimeout(type,120);
})();

/* TIME */
music.addEventListener("loadedmetadata",()=>{
duration.innerText=format(music.duration);
});

music.addEventListener("timeupdate",()=>{
if(music.duration){
let p=(music.currentTime/music.duration)*100;
progressBar.style.width=p+"%";
current.innerText=format(music.currentTime);
}
});

progressContainer.onclick=e=>{
let w=e.currentTarget.clientWidth;
music.currentTime=(e.offsetX/w)*music.duration;
};

/* PLAY */
playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

/* VISUALIZER */
const canvas=document.getElementById("circleVis");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;
}
resize();
window.addEventListener("resize",resize);

let audioCtx, analyser, data;

function setup(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
analyser=audioCtx.createAnalyser();

let src=audioCtx.createMediaElementSource(music);
src.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize=128;
data=new Uint8Array(analyser.frequencyBinCount);

draw();
}

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(data);

ctx.clearRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;
let r=60;

for(let i=0;i<data.length;i++){
let angle=(i/data.length)*Math.PI*2;
let len=data[i]/3;

let x1=cx+Math.cos(angle)*r;
let y1=cy+Math.sin(angle)*r;

let x2=cx+Math.cos(angle)*(r+len);
let y2=cy+Math.sin(angle)*(r+len);

ctx.strokeStyle="#7b2ff7";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();
}
}

/* ENTER */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;

setTimeout(()=>intro.remove(),1000);

music.play().then(()=>{
playBtn.innerHTML="❚❚";

if(!audioCtx) setup();
if(audioCtx.state==="suspended") audioCtx.resume();
});
};

function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
if(sec<10) sec="0"+sec;
return m+":"+sec;
}
</script>

</body>
</html>
