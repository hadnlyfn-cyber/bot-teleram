<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* ГИФ ФОН */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* затемнение */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* КОНТЕЙНЕР */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* АВАТАР С НЕОНОМ */
.avatar-wrapper {
    position: relative;
    margin-bottom: 30px;
    transform: translateY(-50px);
}

.avatar-wrapper::before {
    content: "";
    position: absolute;
    top: -8px;
    left: -8px;
    width: 196px;
    height: 196px;
    border-radius: 50%;
    background: linear-gradient(45deg, #7b2ff7, #00c6ff);
    filter: blur(15px);
    z-index: -1;
    animation: glow 3s infinite alternate;
}

@keyframes glow {
    from { opacity: 0.6; }
    to { opacity: 1; }
}

.avatar {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
}

/* КНОПКИ */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px;
    padding: 14px 30px;
    width: 240px;
    border-radius: 15px;
    text-decoration: none;
    color: white;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 10px rgba(123,47,247,0.5);

    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #7b2ff7;
}

/* ИКОНКИ */
.icon {
    width: 24px;
    height: 24px;
}

/* КНОПКА МУЗЫКИ */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <!-- АВАТАР -->
    <div class="avatar-wrapper">
        <img src="photo.jpg" class="avatar">
    </div>

    <!-- КНОПКИ -->
    <a class="btn" href="https://twitch.tv/ay3ent" target="_blank">
        <img src="twitch.png" class="icon"> Twitch
    </a>

    <a class="btn" href="https://t.me/ay3ent" target="_blank">
        <img src="telegram.png" class="icon"> Telegram
    </a>

</div>

<!-- МУЗЫКА -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
let music = document.getElementById("music");
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
    } else {
        music.play();
        isPlaying = true;
    }
}
</script>

</body>
</html>
