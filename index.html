<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: 1s;
}

.intro-text {
    color: white;
    font-size: 42px;
    letter-spacing: 3px;
    text-shadow: 0 0 25px #7b2ff7;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {opacity: 0.6;}
    50% {opacity: 1;}
    100% {opacity: 0.6;}
}

/* MAIN */
.main {
    opacity: 0;
    filter: blur(10px);
    transition: 1.2s ease;
}

.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* АВАТАР */
.avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    box-shadow: 0 0 25px #7b2ff7;
    margin-bottom: 30px;
}

/* КНОПКИ */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.btn-img {
    width: 100px;
    border-radius: 20px;
    transition: 0.2s;
}

.btn-img:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 15px #7b2ff7);
}

.btn-img:active {
    transform: scale(0.95);
}

.btn-text {
    color: white;
    opacity: 0;
    transform: translateX(-20px);
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
    transform: translateX(0);
}

/* ВИЗУАЛИЗАТОР */
.visualizer {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
}

.bar {
    width: 4px;
    height: 10px;
    background: #7b2ff7;
    box-shadow: 0 0 10px #7b2ff7;
}

/* МУЗЫКА */
.music-panel {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    padding: 10px 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 20px;
}

.volume {
    width: 100px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
    <div class="intro-text">AY3ENT BIO</div>
</div>

<!-- MAIN -->
<div class="main" id="main">

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank">
<img src="twitch2.png" class="btn-img">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank">
<img src="telegram.png" class="btn-img">
</a>
<span class="btn-text">telegram</span>
</div>

</div>
</div>

<div class="visualizer" id="visualizer"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-panel">
<input type="range" min="0" max="1" step="0.01" value="0.5" id="volume">
</div>

</div>

<script>
let music = document.getElementById("music");
let visualizer = document.getElementById("visualizer");
let volume = document.getElementById("volume");

let audioCtx, analyser, source;

// ВХОД
function enterSite() {
    let intro = document.querySelector(".intro");
    let main = document.getElementById("main");

    intro.style.opacity = "0";
    intro.style.filter = "blur(10px)";

    setTimeout(() => {
        intro.style.display = "none";
        main.style.opacity = "1";
        main.style.filter = "blur(0)";
    }, 800);

    music.play();
    setupAudio();
    animate();
}

// AUDIO
function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 64;
}

// ВИЗУАЛИЗАТОР
for (let i = 0; i < 40; i++) {
    let bar = document.createElement("div");
    bar.classList.add("bar");
    visualizer.appendChild(bar);
}

let bars = document.querySelectorAll(".bar");

function animate() {
    let data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    bars.forEach((bar, i) => {
        bar.style.height = (data[i] / 3) + "px";
    });

    requestAnimationFrame(animate);
}

// ГРОМКОСТЬ
volume.addEventListener("input", () => {
    music.volume = volume.value;
});
</script>

</body>
</html>
