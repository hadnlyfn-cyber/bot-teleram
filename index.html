<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT BIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
overflow:hidden;
}

/* cursor */
.cursor{
position:fixed;
width:12px;
height:12px;
background:white;
border:2px solid #7b2ff7;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
}
.cursor-follower{
position:fixed;
width:35px;
height:35px;
border:1px solid rgba(255,255,255,0.3);
border-radius:50%;
pointer-events:none;
z-index:9998;
}

/* intro */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:1s;
}

/* bg */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
}

/* wrapper */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
gap:10px;
opacity:0;
transition:1.2s;
}

/* avatar */
.avatar-wrap{
position:relative;
width:140px;
height:140px;
}
.avatar{
width:100%;
height:100%;
border-radius:50%;
}

/* buttons */
.buttons{
display:flex;
flex-direction:column;
gap:15px;
}
.btn-row{
display:flex;
align-items:center;
gap:10px;
}
.btn img{
width:50px;
}

/* player */
.player{
width:80%;
margin-top:20px;
}

/* mobile */
@media(max-width:768px){
body{cursor:auto;}
.cursor,.cursor-follower{display:none;}

.wrapper{
width:95vw;
height:90vh;
overflow-y:auto;
}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<div id="typing" style="color:white;"></div>

<div class="avatar-wrap">
<img src="photo.jpg" class="avatar">
</div>

<div id="views" style="color:#aaa;">👁 ...</div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank">
<img src="twitch2.png">
</a>
<span style="color:white;">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank">
<img src="telegram.png">
</a>
<span style="color:white;">telegram</span>
</div>
</div>

<div class="player">
<button id="playBtn">▶</button>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* cursor */
let cur=document.getElementById("cursor");
let fol=document.getElementById("cursorFollower");

let x=0,y=0,fx=0,fy=0;

document.onmousemove=e=>{
x=e.clientX;y=e.clientY;
cur.style.left=x+"px";
cur.style.top=y+"px";
};

function loop(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
fol.style.left=fx+"px";
fol.style.top=fy+"px";
requestAnimationFrame(loop);
}
loop();

/* typing */
let words=["ay3ent","streamer","developer"];
let i=0,j=0;
(function type(){
typing.innerHTML=words[i].slice(0,j)+"|";
j++;
if(j>words[i].length+2){j=0;i=(i+1)%words.length;}
setTimeout(type,120);
})();

/* audio */
const musicEl=document.getElementById("music");
const playBtn=document.getElementById("playBtn");

playBtn.onclick=()=>{
if(musicEl.paused){
musicEl.play();
playBtn.innerText="❚❚";
}else{
musicEl.pause();
playBtn.innerText="▶";
}
};

/* intro */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;
setTimeout(()=>intro.remove(),800);

musicEl.play().catch(()=>{});
};

/* 🔥 SUPABASE SAFE */
try{
const supabase = window.supabase.createClient(
  "https://ionsrvajvxpifitqljgo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlvbnNydmFqdnhwaWZpdHFsamdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjAzMzUsImV4cCI6MjA5MjI5NjMzNX0.nhM_fUiw99ZxzlEwZMS6kBJNXjNzGNpdfwo9x5mEgF0"
);

let uid=localStorage.getItem("uid");

if(!uid){
uid=crypto.randomUUID();
localStorage.setItem("uid",uid);

}

.select("*",{count:"exact",head:true})
.then(r=>{

});

}catch(e){

}

</script>

</body>
</html>
