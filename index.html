<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 999;
    transition: 1s;
}

.main {
    opacity: 0;
    transition: 1.5s;
}

/* BG */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 30px #7b2ff7;
}

/* TEXT */
.typing {
    color: white;
    margin-top: 10px;
    margin-bottom: 20px;
    font-size: 14px;
}

/* VIEWS */
.views {
    color: #aaa;
    margin-top: 10px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* BUTTON STYLE */
.btn {
    position: relative;
    padding: 10px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    transition: 0.25s;
    transform-style: preserve-3d;
    cursor: pointer;
}

.btn img {
    width: 55px;
    border-radius: 12px;
}

.btn-text {
    color: white;
    opacity: 0;
    transform: translateX(-10px);
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
    transform: translateX(0);
}

.btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 25px rgba(123,47,247,0.7);
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    padding: 18px;
    border-radius: 25px;

    background: rgba(20,20,20,0.35);
    backdrop-filter: blur(20px);

    box-shadow: 0 0 40px rgba(123,47,247,0.3);
}

/* PLAY BUTTON */
.play-btn {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: none;
    background: #7b2ff7;
    color: white;
    font-size: 22px;
    cursor: pointer;
    display: block;
    margin: auto;
}

/* PROGRESS */
.progress-container {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: #7b2ff7;
}

/* TIME */
.time {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    color: #aaa;
    font-size: 11px;
}
</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="main" id="main">

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="typing" id="typing"></div>

<div class="views" id="views">👁 0</div>

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" class="btn tilt">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" class="btn tilt">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

</div>

<!-- PLAYER -->
<div class="player">

<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5YVBwTUnlCLzrZgxuoNhbkdEMDReOJKo",
  authDomain: "boty-b7a7f.firebaseapp.com",
  databaseURL: "https://boty-b7a7f-default-rtdb.firebaseio.com/",
  projectId: "boty-b7a7f",
  storageBucket: "boty-b7a7f.firebasestorage.app",
  messagingSenderId: "1011485229092",
  appId: "1:1011485229092:web:1d3e8c272845b36dcc18b1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const viewsRef = ref(db, "views");

get(viewsRef).then((snap)=>{
let count = snap.exists()?snap.val():0;
set(viewsRef, count + 1);
});

onValue(viewsRef, (snap)=>{
document.getElementById("views").innerText = "👁 " + snap.val();
});
</script>

<script>
let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let progressBar = document.getElementById("progressBar");
let progressContainer = document.getElementById("progressContainer");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>document.querySelector(".intro").remove(),1000);
}

/* PLAYER */
playBtn.onclick = ()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

music.onloadedmetadata = ()=>{
document.getElementById("duration").innerText = format(music.duration);
};

music.ontimeupdate = ()=>{
let percent = (music.currentTime / music.duration) * 100;
progressBar.style.width = percent + "%";
document.getElementById("current").innerText = format(music.currentTime);
};

progressContainer.onclick = (e)=>{
let width = e.currentTarget.clientWidth;
let clickX = e.offsetX;
music.currentTime = (clickX / width) * music.duration;
};

function format(s){
let m = Math.floor(s/60);
let sec = Math.floor(s%60);
if(sec<10) sec="0"+sec;
return m+":"+sec;
}

/* TYPING */
let words=["ay3ent...","streamer...","developer..."];
let i=0,j=0;

function type(){
document.getElementById("typing").innerText = words[i].slice(0,j++);
if(j>words[i].length){
j=0;
i=(i+1)%words.length;
}
setTimeout(type,150);
}
type();

/* TILT */
document.querySelectorAll(".tilt").forEach(el=>{
el.addEventListener("mousemove",e=>{
let r=el.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;
el.style.transform=`rotateX(${-(y/r.height-0.5)*15}deg) rotateY(${(x/r.width-0.5)*15}deg)`;
});
el.addEventListener("mouseleave",()=>el.style.transform="rotateX(0) rotateY(0)");
});
</script>

</body>
</html>
