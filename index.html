<script>
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

/* 🔥 CURSOR (ПЛАВНЫЙ + ВИДИМЫЙ) */
const cursor = document.getElementById("cursor");

let cx = 0, cy = 0, tx = 0, ty = 0;

document.addEventListener("mousemove", e=>{
tx = e.clientX;
ty = e.clientY;
});

function cursorLoop(){
cx += (tx - cx) * 0.2;
cy += (ty - cy) * 0.2;
cursor.style.left = cx + "px";
cursor.style.top = cy + "px";
requestAnimationFrame(cursorLoop);
}
cursorLoop();

/* 🔥 TYPING */
const typing = document.getElementById("typing");
let words=["ay3ent","streamer","developer"];
let i=0,j=0;

function type(){
typing.innerHTML=words[i].slice(0,j)+"|";
j++;
if(j>words[i].length+3){
j=0;
i=(i+1)%words.length;
}
setTimeout(type,120);
}
type();

/* 🔥 TIME */
music.addEventListener("loadedmetadata",()=>{
duration.innerText=format(music.duration);
});

music.addEventListener("timeupdate",()=>{
if(music.duration){
let p=(music.currentTime/music.duration)*100;
progressBar.style.width=p+"%";
current.innerText=format(music.currentTime);
}
});

progressContainer.onclick=e=>{
let w=e.currentTarget.clientWidth;
music.currentTime=(e.offsetX/w)*music.duration;
};

/* 🔥 PLAY */
playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

/* 🔥 VISUALIZER */
const canvas = document.getElementById("circleVis");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener("resize", resize);

let audioCtx, analyser, data;

function setupAudio(){
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
analyser = audioCtx.createAnalyser();

const src = audioCtx.createMediaElementSource(music);
src.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 128;
data = new Uint8Array(analyser.frequencyBinCount);

draw();
}

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(data);

ctx.clearRect(0,0,canvas.width,canvas.height);

let cx = canvas.width/2;
let cy = canvas.height/2;
let r = 60;

for(let i=0;i<data.length;i++){
let angle=(i/data.length)*Math.PI*2;
let len=data[i]/3;

let x1=cx+Math.cos(angle)*r;
let y1=cy+Math.sin(angle)*r;

let x2=cx+Math.cos(angle)*(r+len);
let y2=cy+Math.sin(angle)*(r+len);

ctx.strokeStyle="#7b2ff7";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();
}
}

/* 🔥 ENTER */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;

setTimeout(()=>intro.remove(),1000);

music.play().then(()=>{
playBtn.innerHTML="❚❚";

if(!audioCtx) setupAudio();
if(audioCtx.state==="suspended") audioCtx.resume();
}).catch(()=>{});
};

/* 🔥 FORMAT */
function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
if(sec<10) sec="0"+sec;
return m+":"+sec;
}
</script>
