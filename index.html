<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Bungee", sans-serif;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
}

.avatar {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
    transition: 0.3s;
}

.avatar:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px #7b2ff7, 0 0 80px #7b2ff7;
}

.title {
    color: white;
    font-size: 28px;
    margin-top: 20px;
    text-shadow: 0 0 10px #7b2ff7;
}

.btn {
    display: block;
    margin: 15px auto;
    padding: 12px 30px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    background: linear-gradient(45deg, #7b2ff7, #0f2027);
    width: 200px;
}
</style>

</head>
<body>

<div class="container">

    <!-- ФОТО -->
    <img src="photo.jpg" class="avatar">

    <div class="title">🖤 AY3ENT</div>

    <!-- КНОПКИ (можем убрать потом) -->
    <a class="btn" href="https://twitch.tv/ay3ent">🎮 Twitch</a>
    <a class="btn" href="https://t.me/ay3ent">✈️ Telegram</a>

</div>

</body>
</html>
