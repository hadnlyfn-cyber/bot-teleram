<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: 1s;
}

.main {
    opacity: 0;
    transition: 1.5s;
}

/* BG */
.background {
    position: fixed;
    width: 120%;
    height: 120%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 30px #7b2ff7;
}

/* STATUS */
.status {
    color: #00ff88;
    font-size: 12px;
}

/* STATS */
.stats {
    color: #aaa;
    margin: 10px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn {
    padding: 10px 20px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(123,47,247,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.25s;
}

.btn img {
    width: 55px;
}

.btn:hover {
    transform: scale(1.05);
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    padding: 10px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
}

.play-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

/* ANIM */
.fade {
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="main" id="main">

<div class="background"></div>

<div class="container fade">

<img src="photo.jpg" class="avatar">

<div class="status">● online</div>

<div class="stats" id="views">👁 0 | 👥 0</div>

<div class="buttons">
<a href="https://twitch.tv/ay3ent" class="btn">
<img src="twitch2.png"> twitch
</a>

<a href="https://t.me/ay3ent" class="btn">
<img src="telegram.png"> telegram
</a>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<button id="playBtn" class="play-btn">▶</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<audio id="music" src="music.mp3"></audio>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "boty-b7a7f.firebaseapp.com",
  databaseURL: "https://boty-b7a7f-default-rtdb.firebaseio.com/",
  projectId: "boty-b7a7f",
  storageBucket: "boty-b7a7f.firebasestorage.app",
  messagingSenderId: "1011485229092",
  appId: "1:1011485229092:web:..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* VIEWS */
const viewRef = ref(db, "views");
get(viewRef).then(s=>{
let c=s.exists()?s.val():0;
set(viewRef,c+1);
});

/* ONLINE USERS */
const onlineRef = ref(db, "online");
const user = push(onlineRef);

set(user, true);
onDisconnect(user).remove();

onValue(onlineRef, s=>{
let count = s.exists() ? Object.keys(s.val()).length : 0;
document.getElementById("views").innerText =
"👁 " + (s.val()?.views || 0) + " | 👥 " + count;
});

/* VIEW UPDATE */
onValue(viewRef, s=>{
let views = s.val() || 0;
onValue(onlineRef, snap=>{
let online = snap.exists() ? Object.keys(snap.val()).length : 0;
document.getElementById("views").innerText =
"👁 " + views + " | 👥 " + online;
});
});
</script>

<script>
let music = document.getElementById("music");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>document.querySelector(".intro").remove(),1000);

/* 🔥 запуск музыки */
music.play().catch(()=>{});
}

/* PLAYER */
let playBtn=document.getElementById("playBtn");
let volume=document.getElementById("volume");

playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

volume.oninput=e=>music.volume=e.target.value;
</script>

</body>
</html>
