```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:#121212;
font-family:"Bungee",sans-serif;
cursor:none;
}

/* CURSOR */
.cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
z-index:9999;
pointer-events:none;
transform:translate(-50%,-50%);
}
.cursor-glow{
position:fixed;
width:40px;
height:40px;
border-radius:50%;
background:rgba(123,47,247,0.12);
filter:blur(12px);
z-index:9998;
pointer-events:none;
transform:translate(-50%,-50%);
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:opacity 0.6s ease;
}
.intro::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
filter:blur(20px) brightness(0.4);
z-index:-1;
}
.enter-text{
color:white;
font-size:26px;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:
0 0 4px rgba(255,255,255,0.8),
0 0 10px rgba(255,255,255,0.5);
animation:pulse 1.8s infinite;
}
@keyframes pulse{
0%{opacity:0.7;}
50%{opacity:1;}
100%{opacity:0.7;}
}

/* BG */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
filter:brightness(0.5);
}

/* WRAPPER */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.7);
backdrop-filter:blur(25px);
box-shadow:0 0 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:0.6s;
}

/* AVATAR */
.avatar{
width:140px;
height:140px;
border-radius:50%;
}

/* TEXT */
.typing{
margin-top:10px;
font-size:20px;
color:white;
text-shadow:0 0 2px black;
}

/* BUTTONS */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}
.btn{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:14px;
background:rgba(255,255,255,0.05);
transition:0.25s;
text-decoration:none;
}
.btn img{width:40px;}
.btn span{color:white;opacity:0.7;}
.btn:hover{
transform:scale(1.05);
opacity:1;
}

/* PLAYER */
.player{
position:absolute;
bottom:50px;
width:70%;
}
.play-btn{
width:50px;
height:50px;
border-radius:50%;
border:none;
background:#7b2ff7;
color:white;
cursor:pointer;
}

/* PROGRESS */
.progress-container{
width:100%;
height:4px;
background:#333;
margin-top:10px;
cursor:pointer;
}
#progressBar{
height:100%;
width:0%;
background:#7b2ff7;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
font-size:11px;
color:#aaa;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="intro" id="intro">
<div class="enter-text">click to enter</div>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<img src="photo.jpg" class="avatar">

<div class="typing">AY3ENT</div>

<div class="buttons">
<a href="https://twitch.tv/ay3ent" target="_blank" class="btn">
<img src="twitch2.png"><span>twitch</span>
</a>
<a href="https://t.me/ay3ent" target="_blank" class="btn">
<img src="telegram.png"><span>telegram</span>
</a>
</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>
const music=document.getElementById("music");
const playBtn=document.getElementById("playBtn");

/* CURSOR */
const c=document.getElementById("cursor");
const g=document.getElementById("cursorGlow");

let x=0,y=0,fx=0,fy=0;
document.onmousemove=e=>{
x=e.clientX;y=e.clientY;
c.style.left=x+"px";
c.style.top=y+"px";
};
(function loop(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
g.style.left=fx+"px";
g.style.top=fy+"px";
requestAnimationFrame(loop);
})();

/* AUDIO */
playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

/* TIME */
music.onloadedmetadata=()=>duration.innerText=format(music.duration);
music.ontimeupdate=()=>{
let p=(music.currentTime/music.duration)*100;
progressBar.style.width=p+"%";
current.innerText=format(music.currentTime);
};

/* SEEK */
progressContainer.onclick=e=>{
music.currentTime=(e.offsetX/e.target.clientWidth)*music.duration;
};

/* ENTER */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;
setTimeout(()=>intro.remove(),600);
music.play();
playBtn.innerHTML="❚❚";
};

function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}
</script>

</body>
</html>
