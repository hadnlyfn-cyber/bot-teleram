<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family:"Bungee", sans-serif;
}

/* BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url('bg.gif') center/cover no-repeat;
    z-index:-2;
}

/* 🔥 GLASS CONTAINER */
.wrapper{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    
    width:80vw;
    height:80vh;

    border-radius:30px;
    background:rgba(20,20,20,0.4);
    backdrop-filter:blur(25px);

    box-shadow:0 0 60px rgba(123,47,247,0.3);
    
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* CONTENT */
.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    box-shadow:0 0 25px #7b2ff7;
}

.typing{color:white;margin:10px 0;}
.views{color:#aaa;margin-bottom:15px;}

/* BUTTONS */
.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn{
    padding:10px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    transition:0.25s;
}

.btn img{
    width:50px;
    border-radius:10px;
}

.btn-text{
    color:white;
    opacity:0;
    transform:translateX(-10px);
    transition:0.3s;
}

.btn-row:hover .btn-text{
    opacity:1;
    transform:translateX(0);
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #7b2ff7;
}

/* PLAYER */
.player{
    position:absolute;
    bottom:20px;
    width:80%;
}

.play-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:#7b2ff7;
    color:white;
    font-size:20px;
    display:block;
    margin:auto;
}

/* PROGRESS */
.progress-container{
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.2);
    margin-top:12px;
}

#progressBar{
    height:100%;
    width:0%;
    background:#7b2ff7;
}

/* VISUALIZER */
.visualizer{
    width:100%;
    height:60px;
    margin-top:10px;
}

#audioVisualizer{
    width:100%;
    height:100%;
}

/* TIME */
.time{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="wrapper">

<img src="photo.jpg" class="avatar">

<div id="typing" class="typing"></div>

<div id="views" class="views">👁 0</div>

<div class="buttons">

<div class="btn-row">
<a href="#" class="btn"><img src="twitch2.png"></a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="#" class="btn"><img src="telegram.png"></a>
<span class="btn-text">telegram</span>
</div>

</div>

<!-- PLAYER -->
<div class="player">

<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="visualizer">
<canvas id="audioVisualizer"></canvas>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>
// 🎧 тот же Web Audio API код (как был у тебя — он уже рабочий)
</script>

</body>
</html>
