<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
}

/* CURSOR */
.cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
z-index:9999;
pointer-events:none;
transform:translate(-50%,-50%);
}
.cursor-glow{
position:fixed;
width:60px;
height:60px;
border-radius:50%;
background:radial-gradient(circle, rgba(123,47,247,0.4), transparent);
filter:blur(15px);
z-index:9998;
pointer-events:none;
transform:translate(-50%,-50%);
transition:0.2s;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:opacity 1s;
}

/* BG */
.background{
position:fixed;
width:110%;
height:110%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
transition:0.2s;
}

/* WRAPPER */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(123,47,247,0.35);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:1.5s;
}

/* TEXT */
.typing{color:white;margin-bottom:10px;height:20px;}

/* AVATAR */
.avatar-wrap{position:relative;width:150px;height:150px;}
.avatar{width:100%;height:100%;border-radius:50%;}
#circleVis{position:absolute;width:100%;height:100%;}

/* BUTTONS */
.buttons{margin-top:20px;display:flex;flex-direction:column;gap:15px;}
.btn-row{display:flex;align-items:center;gap:10px;}
.btn{padding:10px;border-radius:16px;background:rgba(255,255,255,0.06);transition:0.25s;}
.btn img{width:50px;border-radius:10px;}
.btn-text{color:white;opacity:0;transform:translateX(-10px);transition:0.3s;}
.btn-row:hover .btn-text{opacity:1;transform:translateX(0);}
.btn:hover{transform:scale(1.1);box-shadow:0 0 25px #7b2ff7;}

/* PLAYER */
.player{position:absolute;bottom:80px;width:80%;}
.player-top{display:flex;align-items:center;justify-content:center;gap:15px;}

.play-btn{
width:55px;height:55px;border-radius:50%;
background:#7b2ff7;border:none;color:white;cursor:pointer;
box-shadow:0 0 20px #7b2ff7;
}

.volume-wrap{display:flex;align-items:center;gap:8px;}
.volume-icon{color:white;cursor:pointer;}
.volume-slider{
width:70px;height:4px;
appearance:none;background:rgba(255,255,255,0.2);
border-radius:10px;
}
.volume-slider::-webkit-slider-thumb{
appearance:none;width:10px;height:10px;
background:#7b2ff7;border-radius:50%;
}

/* PROGRESS */
.progress-container{
width:100%;height:4px;
background:rgba(255,255,255,0.2);
margin-top:10px;cursor:pointer;
}
#progressBar{height:100%;width:0%;background:#7b2ff7;}

/* TIME */
.time{
display:flex;justify-content:space-between;
font-size:11px;color:#aaa;
}

/* VIS */
#audioVis{
position:absolute;
bottom:0;
width:100%;
height:60px;
}

/* MOBILE */
@media(max-width:600px){
.wrapper{width:95vw;height:90vh;}
.buttons{flex-direction:column;}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT</h1>
</div>

<div class="background" id="bg"></div>

<div class="wrapper" id="main">

<div id="typing" class="typing"></div>

<div class="avatar-wrap">
<canvas id="circleVis"></canvas>
<img src="photo.jpg" class="avatar">
</div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>
</div>

<div class="player">
<div class="player-top">
<button id="playBtn" class="play-btn">▶</button>
<div class="volume-wrap">
<span id="volumeIcon">🔊</span>
<input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.01">
</div>
</div>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

<canvas id="audioVis"></canvas>

</div>

<audio id="music" src="music.mp3"></audio>

<script>
const music=document.getElementById("music");
const playBtn=document.getElementById("playBtn");

/* CURSOR */
const cur=document.getElementById("cursor");
const glow=document.getElementById("cursorGlow");
let x=0,y=0,fx=0,fy=0;

document.onmousemove=e=>{
x=e.clientX;y=e.clientY;
cur.style.left=x+"px";
cur.style.top=y+"px";

/* parallax */
bg.style.transform=`translate(${x/50}px,${y/50}px)`;
};

(function loop(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
glow.style.left=fx+"px";
glow.style.top=fy+"px";
requestAnimationFrame(loop);
})();

/* TYPING */
let words=["ay3ent","streamer","developer"];
let i=0,j=0;
(function t(){
typing.innerHTML=words[i].slice(0,j)+"|";
j++;
if(j>words[i].length+3){j=0;i=(i+1)%words.length;}
setTimeout(t,100);
})();

/* AUDIO */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const analyser=ctx.createAnalyser();
const src=ctx.createMediaElementSource(music);
src.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=128;
const data=new Uint8Array(analyser.frequencyBinCount);

/* VOLUME */
const volume=document.getElementById("volume");
const volumeIcon=document.getElementById("volumeIcon");

volume.value=localStorage.getItem("vol")||0.5;
music.volume=volume.value;

volume.oninput=()=>{
music.volume=volume.value;
localStorage.setItem("vol",volume.value);
volumeIcon.textContent=music.volume==0?"🔇":"🔊";
};

volumeIcon.onclick=()=>{
music.volume=music.volume>0?0:0.5;
volume.value=music.volume;
volumeIcon.textContent=music.volume==0?"🔇":"🔊";
};

/* VIS */
const c=document.getElementById("audioVis");
const ctx2=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=60;
}
resize();
window.onresize=resize;

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);

ctx2.clearRect(0,0,c.width,c.height);

let bass=data[1]/255;
main.style.transform=`translate(-50%,-50%) scale(${1+ bass*0.03})`;

let w=c.width/data.length;
for(let i=0;i<data.length;i++){
let h=data[i]/2;
ctx2.fillStyle="#7b2ff7";
ctx2.fillRect(i*w,c.height-h,w-2,h);
}
}

/* PLAY */
playBtn.onclick=()=>{
if(music.paused){
music.play();ctx.resume();draw();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

/* TIME */
music.onloadedmetadata=()=>duration.innerText=format(music.duration);
music.ontimeupdate=()=>{
let p=(music.currentTime/music.duration)*100;
progressBar.style.width=p+"%";
current.innerText=format(music.currentTime);
};

/* ENTER */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;
setTimeout(()=>intro.remove(),1000);
music.play();ctx.resume();draw();
playBtn.innerHTML="❚❚";
};

function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}
</script>

</body>
</html>
