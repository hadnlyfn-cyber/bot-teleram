<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: opacity 1s ease;
}

.intro-text {
    color: white;
    font-size: 40px;
    text-shadow: 0 0 25px #7b2ff7;
}

/* MAIN */
.main {
    opacity: 0;
    transition: opacity 1.5s ease;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    box-shadow: 0 0 25px #7b2ff7;
    margin-bottom: 15px;
}

/* TYPING */
.typing {
    color: white;
    margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* КНОПКА */
.btn {
    display: flex;
    align-items: center;
    gap: 10px;

    padding: 10px 16px;
    border-radius: 25px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(123,47,247,0.3);

    transition: 0.25s;
}

/* PNG */
.btn img {
    width: 60px;
    border-radius: 15px;
}

/* HOVER */
.btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 20px rgba(123,47,247,0.6);
    background: linear-gradient(45deg, rgba(123,47,247,0.2), rgba(30,60,114,0.2));
}

/* TEXT */
.btn-text {
    color: white;
    opacity: 0;
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    padding: 12px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(123,47,247,0.5);
}

.controls {
    display: flex;
    justify-content: center;
}

.play-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: white;
    cursor: pointer;
}

.progress {
    width: 100%;
    margin-top: 6px;
}

.bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
}

.time {
    color: #aaa;
    font-size: 10px;
}

.volume {
    width: 70px;
}

/* MOBILE */
@media(max-width:600px){
    .avatar {width:100px;height:100px;}
    .btn img {width:50px;}
}
</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<div class="intro-text">AY3ENT BIO</div>
</div>

<div class="main" id="main">

<div class="background"></div>
<canvas id="particles"></canvas>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="typing" id="typing"></div>

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

</div>

<div class="player">
<div class="controls">
<button id="playBtn" class="play-btn">▶</button>
</div>

<input type="range" id="progress" class="progress">

<div class="bottom">
<span id="currentTime" class="time">0:00</span>
<input type="range" id="volume" class="volume" min="0" max="1" step="0.01">
<span id="duration" class="time">0:00</span>
</div>
</div>

<audio id="music" src="music.mp3"></audio>

</div>

<script>
/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>document.querySelector(".intro").remove(),1000);
music.play();
}

/* PARTICLES */
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for(let i=0;i<40;i++){
particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
vx: (Math.random()-0.5)*0.4,
vy: (Math.random()-0.5)*0.4
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fillStyle="rgba(123,47,247,0.5)";
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

/* AUDIO */
let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");
let currentTime = document.getElementById("currentTime");
let duration = document.getElementById("duration");

playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

music.addEventListener("loadedmetadata", ()=>{
duration.innerText = formatTime(music.duration);
});

music.addEventListener("timeupdate", ()=>{
progress.value = (music.currentTime/music.duration)*100;
currentTime.innerText = formatTime(music.currentTime);
});

progress.oninput=()=>music.currentTime=(progress.value/100)*music.duration;
volume.oninput=()=>music.volume=volume.value;

function formatTime(sec){
let m=Math.floor(sec/60);
let s=Math.floor(sec%60);
if(s<10)s="0"+s;
return m+":"+s;
}

/* TYPING */
let words=["ay3ent...","streamer...","developer..."];
let i=0,j=0;

function type(){
document.getElementById("typing").innerText=words[i].slice(0,j);
j++;
if(j>words[i].length){
setTimeout(()=>{j=0;i=(i+1)%words.length},1000);
}
setTimeout(type,180);
}
type();
</script>

</body>
</html>
