<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT BIO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
overflow:hidden;
}

/* cursor */
.cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border:2px solid #7b2ff7;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
box-shadow:0 0 10px #7b2ff7;
}
.cursor-follower{
position:fixed;
width:30px;
height:30px;
border:1px solid rgba(255,255,255,0.3);
border-radius:50%;
pointer-events:none;
z-index:9998;
}

/* intro */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:1s;
}

/* bg */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
}

/* wrapper */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
gap:15px;
opacity:0;
transition:1.2s;
overflow:hidden;
}

/* avatar */
.avatar-wrap{
position:relative;
width:150px;
height:150px;
}
.avatar{
width:100%;
height:100%;
border-radius:50%;
}
#circleVis{
position:absolute;
width:100%;
height:100%;
}

/* typing */
.typing{color:white;height:20px;}

/* buttons */
.buttons{display:flex;flex-direction:column;gap:15px;}
.btn-row{display:flex;align-items:center;gap:10px;}
.btn img{width:50px;border-radius:10px;}
.btn-text{
color:white;
opacity:0;
transition:0.3s;
}
.btn-row:hover .btn-text{opacity:1;}

/* PLAYER */
.player{
width:80%;
margin-top:10px;
}

.play-btn{
width:60px;
height:60px;
border-radius:50%;
background:#7b2ff7;
border:none;
color:white;
display:block;
margin:auto;
cursor:pointer;
box-shadow:0 0 20px #7b2ff7;
}

/* progress */
.progress-container{
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
margin-top:10px;
cursor:pointer;
}
#progressBar{
height:100%;
width:0%;
background:#7b2ff7;
}

/* visualizer */
.visualizer{
width:100%;
height:50px;
margin-top:10px;
}

/* mobile */
@media(max-width:768px){
body{cursor:auto;}
.cursor,.cursor-follower{display:none;}

.wrapper{
width:95vw;
height:90vh;
overflow-y:auto;
}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<div id="typing" class="typing"></div>

<div class="avatar-wrap">
<canvas id="circleVis"></canvas>
<img src="photo.jpg" class="avatar">
</div>

<div id="views" style="color:#aaa;">👁 0</div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>
</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="visualizer">
<canvas id="audioVis"></canvas>
</div>

</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */
(async()=>{
const supabase = window.supabase.createClient(
  "https://ionsrvajvxpifitqljgo.supabase.co",
  "ВСТАВЬ_СЮДА_СВОЙ_КЛЮЧ"
);

let uid = localStorage.getItem("uid");
if(!uid){
  uid = crypto.randomUUID();
  localStorage.setItem("uid", uid);
  await supabase.from("views").insert([{ user_id: uid }]);
}

let { count } = await supabase
.from("views")
.select("*", { count:"exact", head:true });

views.innerText = "👁 " + (count || 0);
})();

/* cursor */
let cur=cursor, fol=cursorFollower;
let x=0,y=0,fx=0,fy=0;
document.onmousemove=e=>{
x=e.clientX;y=e.clientY;
cur.style.left=x+"px";
cur.style.top=y+"px";
};
(function loop(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
fol.style.left=fx+"px";
fol.style.top=fy+"px";
requestAnimationFrame(loop);
})();

/* audio */
const music = document.getElementById("music");
const playBtn = document.getElementById("playBtn");

const ctx = new AudioContext();
const analyser = ctx.createAnalyser();
const src = ctx.createMediaElementSource(music);
src.connect(analyser);
analyser.connect(ctx.destination);

const data = new Uint8Array(analyser.frequencyBinCount);

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);

let c = audioVis.getContext("2d");
c.clearRect(0,0,audioVis.width,audioVis.height);

let w = audioVis.width/data.length;
for(let i=0;i<data.length;i++){
let h=data[i]/2;
c.fillStyle="#7b2ff7";
c.fillRect(i*w,audioVis.height-h,w-2,h);
}
}

/* enter */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;
setTimeout(()=>intro.remove(),800);

music.play();
ctx.resume();
draw();
playBtn.innerHTML="❚❚";
};

/* player */
playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

</script>

</body>
</html>
