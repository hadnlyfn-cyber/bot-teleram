<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* ФОН */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* КОНТЕЙНЕР */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* АВАТАР */
.avatar {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 25px;
    transform: translateY(-40px);
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
}

/* КНОПКИ В РЯД */
.buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    align-items: center;
}

/* PNG КНОПКИ */
.btn-img {
    width: 150px;
    height: auto;
    border-radius: 25px;
    transition: all 0.25s ease;
}

.btn-img:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 0 10px rgba(123,47,247,0.6));
}

/* МУЗЫКА */
.music-panel {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    align-items: center;
    gap: 15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;

    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 15px rgba(123,47,247,0.5);
}

.music-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
}

.volume {
    width: 120px;
    accent-color: #7b2ff7;
}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <!-- АВАТАР -->
    <img src="photo.jpg" class="avatar">

    <!-- КНОПКИ -->
    <div class="buttons">
        <a href="https://twitch.tv/ay3ent" target="_blank">
            <img src="twitch2.png" class="btn-img">
        </a>

        <a href="https://t.me/ay3ent" target="_blank">
            <img src="telegram.png" class="btn-img">
        </a>
    </div>

</div>

<!-- МУЗЫКА -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-panel">
    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🔊</button>
    <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume" id="volumeControl">
</div>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let volume = document.getElementById("volumeControl");

music.volume = 0.5;
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        btn.innerText = "🔇";
        isPlaying = false;
    } else {
        music.play();
        btn.innerText = "🔊";
        isPlaying = true;
    }
}

volume.addEventListener("input", function() {
    music.volume = this.value;
});
</script>

</body>
</html>
