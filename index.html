<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* ФОН */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* КОНТЕЙНЕР */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* АВАТАР */
.avatar {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 30px;
    transform: translateY(-40px);
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
}

/* КНОПКИ */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* МЕНЬШИЕ PNG КНОПКИ */
.btn-img {
    width: 110px; /* уменьшили */
    border-radius: 20px;
    transition: 0.3s;
}

.btn-img:hover {
    transform: scale(1.07);
    filter: drop-shadow(0 0 12px rgba(123,47,247,0.8));
}

/* ТЕКСТ */
.btn-text {
    color: white;
    font-size: 14px;
    opacity: 0;
    transform: translateX(-20px);
    transition: 0.4s;
    text-shadow: 0 0 10px #7b2ff7, 0 0 20px #7b2ff7;
}

.btn-row:hover .btn-text {
    opacity: 1;
    transform: translateX(0);
}

/* ВИЗУАЛИЗАТОР */
.visualizer {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
}

.bar {
    width: 5px;
    height: 20px;
    background: #7b2ff7;
    box-shadow: 0 0 10px #7b2ff7;
}

/* МУЗЫКА */
.music-panel {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    align-items: center;
    gap: 15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 20px;

    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 15px rgba(123,47,247,0.5);
}

.music-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
}

.volume {
    width: 120px;
    accent-color: #7b2ff7;
}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <img src="photo.jpg" class="avatar">

    <div class="buttons">

        <div class="btn-row">
            <a href="https://twitch.tv/ay3ent" target="_blank">
                <img src="twitch2.png" class="btn-img">
            </a>
            <span class="btn-text">twitch</span>
        </div>

        <div class="btn-row">
            <a href="https://t.me/ay3ent" target="_blank">
                <img src="telegram.png" class="btn-img">
            </a>
            <span class="btn-text">telegram</span>
        </div>

    </div>

</div>

<!-- ВИЗУАЛИЗАТОР -->
<div class="visualizer" id="visualizer"></div>

<!-- МУЗЫКА -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-panel">
    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">🔊</button>
    <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume" id="volumeControl">
</div>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let volume = document.getElementById("volumeControl");
let visualizer = document.getElementById("visualizer");

music.volume = 0.5;
let isPlaying = false;

// полоски
for (let i = 0; i < 30; i++) {
    let bar = document.createElement("div");
    bar.classList.add("bar");
    visualizer.appendChild(bar);
}

let bars = document.querySelectorAll(".bar");

function animateBars() {
    bars.forEach(bar => {
        let height = Math.random() * 50 + 10;
        bar.style.height = height + "px";
    });
}

let interval;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        btn.innerText = "🔇";
        clearInterval(interval);
        isPlaying = false;
    } else {
        music.play();
        btn.innerText = "🔊";
        interval = setInterval(animateBars, 100);
        isPlaying = true;
    }
}

volume.addEventListener("input", function() {
    music.volume = this.value;
});
</script>

</body>
</html>
