<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
    cursor: default;
}

/* ФОН */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
    transition: transform 0.2s;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* КОНТЕЙНЕР */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* АВАТАР */
.avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 25px;
    transform: translateY(-40px);
    box-shadow: 0 0 25px #7b2ff7;
    animation: fadeIn 1s ease;
}

/* КНОПКИ */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 1.2s ease;
}

/* PNG кнопка */
.btn-img {
    width: 100px;
    border-radius: 20px;
    transition: all 0.2s ease;
}

.btn-img:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 15px rgba(123,47,247,0.9));
}

.btn-img:active {
    transform: scale(0.95);
}

/* текст */
.btn-text {
    color: white;
    font-size: 14px;
    opacity: 0;
    transform: translateX(-20px);
    transition: 0.3s;
    text-shadow: 0 0 10px #7b2ff7;
}

.btn-row:hover .btn-text {
    opacity: 1;
    transform: translateX(0);
}

/* ВИЗУАЛИЗАТОР */
.visualizer {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
}

.bar {
    width: 4px;
    height: 10px;
    background: #7b2ff7;
    box-shadow: 0 0 10px #7b2ff7;
}

/* МУЗЫКА */
.music-panel {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    
    display: flex;
    align-items: center;
    gap: 12px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 10px 18px;
    border-radius: 20px;

    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 15px rgba(123,47,247,0.5);
}

.music-btn {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.volume {
    width: 100px;
    accent-color: #7b2ff7;
}

/* анимация появления */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank">
<img src="twitch2.png" class="btn-img">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank">
<img src="telegram.png" class="btn-img">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

</div>

<div class="visualizer" id="visualizer"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-panel">
<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🔊</button>
<input type="range" min="0" max="1" step="0.01" value="0.5" class="volume" id="volumeControl">
</div>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let volume = document.getElementById("volumeControl");
let visualizer = document.getElementById("visualizer");

let audioCtx, analyser, source;
let isPlaying = false;

// создаём полоски
for (let i = 0; i < 40; i++) {
    let bar = document.createElement("div");
    bar.classList.add("bar");
    visualizer.appendChild(bar);
}
let bars = document.querySelectorAll(".bar");

// реальный визуализатор
function setupAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(music);

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    analyser.fftSize = 64;
}

function animate() {
    let data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    bars.forEach((bar, i) => {
        let value = data[i];
        bar.style.height = (value / 3) + "px";
    });

    requestAnimationFrame(animate);
}

function toggleMusic() {
    if (!audioCtx) setupAudio();

    if (isPlaying) {
        music.pause();
        btn.innerText = "🔇";
        isPlaying = false;
    } else {
        music.play();
        btn.innerText = "🔊";
        animate();
        isPlaying = true;
    }
}

volume.addEventListener("input", () => {
    music.volume = volume.value;
});

/* параллакс */
document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;
    document.getElementById("bg").style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
