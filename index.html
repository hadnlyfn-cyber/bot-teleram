<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT FINAL</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
overflow:hidden;
}

/* CURSOR */
.cursor{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:white;
border:2px solid #7b2ff7;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 15px #7b2ff7;
z-index:9999;
}
.cursor-follower{
position:fixed;
width:40px;
height:40px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.4);
background:rgba(123,47,247,0.08);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9998;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:1s;
}

/* BG */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
}

/* WRAPPER */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(123,47,247,0.35);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:40px;
gap:10px;
opacity:0;
transition:1.5s;
}

/* TEXT */
.typing{
color:white;
height:20px;
}

/* AVATAR */
.avatar-wrap{
position:relative;
width:140px;
height:140px;
}
.avatar{
width:100%;
height:100%;
border-radius:50%;
position:relative;
z-index:2;
}
#circleVis{
position:absolute;
width:100%;
height:100%;
}

/* BUTTONS */
.buttons{
display:flex;
flex-direction:column;
gap:15px;
margin-top:15px;
}
.btn-row{
display:flex;
align-items:center;
gap:10px;
}
.btn{
display:flex;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.06);
text-decoration:none;
}
.btn img{
width:50px;
border-radius:10px;
}
.btn-text{
color:white;
opacity:0;
transform:translateX(-10px);
transition:0.3s;
}
.btn-row:hover .btn-text{
opacity:1;
transform:translateX(0);
}

/* PLAYER */
.player{
position:relative;
width:80%;
margin-top:20px;
}
.play-btn{
width:60px;
height:60px;
border-radius:50%;
background:#7b2ff7;
color:white;
border:none;
margin:auto;
display:block;
}

/* PROGRESS */
.progress-container{
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
margin-top:10px;
cursor:pointer;
}
#progressBar{
height:100%;
width:0%;
background:#7b2ff7;
}

/* VISUALIZER */
.visualizer{
width:100%;
height:50px;
margin-top:10px;
}
#audioVis{
width:100%;
height:100%;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
color:#aaa;
font-size:11px;
}

/* 📱 MOBILE */
@media(max-width:768px){

body{cursor:auto;}

.cursor,.cursor-follower{display:none;}

.wrapper{
width:95vw;
height:90vh;
overflow-y:auto;
padding-top:30px;
}

.avatar-wrap{
width:110px;
height:110px;
}

.player{
width:100%;
}

}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<div id="typing" class="typing"></div>

<div class="avatar-wrap">
<canvas id="circleVis"></canvas>
<img src="photo.jpg" class="avatar">
</div>

<div id="views" style="color:#aaa;">👁 ...</div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>
</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="visualizer">
<canvas id="audioVis"></canvas>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>

/* COUNT FIX */
fetch("https://api.countapi.xyz/hit/ay3ent-bio/views?nocache="+Date.now())
.then(r=>r.json())
.then(d=>views.innerText="👁 "+d.value);

/* CURSOR */
let cur=cursor, fol=cursorFollower;
let x=0,y=0,fx=0,fy=0;

document.onmousemove=e=>{
x=e.clientX;y=e.clientY;
cur.style.left=x+"px";
cur.style.top=y+"px";
};

(function loop(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
fol.style.left=fx+"px";
fol.style.top=fy+"px";
requestAnimationFrame(loop);
})();

/* AUDIO */
let music=document.getElementById("music");
let playBtn=document.getElementById("playBtn");

let ctx=new AudioContext();
let analyser=ctx.createAnalyser();
let src=ctx.createMediaElementSource(music);
src.connect(analyser);
analyser.connect(ctx.destination);

let data=new Uint8Array(analyser.frequencyBinCount);

/* VIS */
let c1=audioVis.getContext("2d");
let c2=circleVis.getContext("2d");

function resize(){
audioVis.width=audioVis.offsetWidth;
audioVis.height=audioVis.offsetHeight;
circleVis.width=circleVis.offsetWidth;
circleVis.height=circleVis.offsetHeight;
}
resize();
window.onresize=resize;

function draw(){
requestAnimationFrame(draw);
analyser.getByteFrequencyData(data);

/* bars */
c1.clearRect(0,0,audioVis.width,audioVis.height);
let w=audioVis.width/data.length;
for(let i=0;i<data.length;i++){
let h=data[i]/2;
c1.fillStyle="#7b2ff7";
c1.fillRect(i*w,audioVis.height-h,w-2,h);
}

/* circle */
c2.clearRect(0,0,circleVis.width,circleVis.height);
let cx=circleVis.width/2;
let cy=circleVis.height/2;
let r=50;

for(let i=0;i<data.length;i++){
let ang=(i/data.length)*Math.PI*2;
let len=data[i]/4;
let x1=cx+Math.cos(ang)*r;
let y1=cy+Math.sin(ang)*r;
let x2=cx+Math.cos(ang)*(r+len);
let y2=cy+Math.sin(ang)*(r+len);
c2.beginPath();
c2.moveTo(x1,y1);
c2.lineTo(x2,y2);
c2.strokeStyle="#7b2ff7";
c2.stroke();
}
}

/* ENTER */
intro.onclick=()=>{
intro.style.opacity=0;
main.style.opacity=1;

setTimeout(()=>intro.remove(),1000);

music.play();
ctx.resume();
draw();
playBtn.innerHTML="❚❚";
};

/* PLAYER */
playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

/* TIME */
music.onloadedmetadata=()=>duration.innerText=format(music.duration);

music.ontimeupdate=()=>{
let p=(music.currentTime/music.duration)*100;
progressBar.style.width=p+"%";
current.innerText=format(music.currentTime);
};

progressContainer.onclick=e=>{
let w=e.currentTarget.clientWidth;
music.currentTime=(e.offsetX/w)*music.duration;
};

function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
return m+":"+(sec<10?"0":"")+sec;
}

/* TYPING */
let wds=["ay3ent","streamer","developer"];
let i=0,j=0;
(function t(){
typing.innerHTML=wds[i].slice(0,j)+"|";
j++;
if(j>wds[i].length+3){j=0;i=(i+1)%wds.length;}
setTimeout(t,120);
})();

</script>

</body>
</html>
