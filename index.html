<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* КУРСОР */
.cursor {
    width: 18px;
    height: 18px;
    border: 2px solid #7b2ff7;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px #7b2ff7;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: 1s;
}

.intro-text {
    color: white;
    font-size: 42px;
    text-shadow: 0 0 30px #7b2ff7;
}

/* MAIN */
.main {
    opacity: 0;
    transition: 1.5s ease;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 120%;
    height: 120%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    box-shadow: 0 0 30px #7b2ff7;
    margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn-img {
    width: 85px;
    border-radius: 20px;
    transition: 0.2s;
}

.btn-img:hover {
    transform: scale(1.1);
    filter: drop-shadow(0 0 10px #7b2ff7);
}

.btn-text {
    color: white;
    opacity: 0;
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
}

/* 🎧 AUDIO PLAYER */
.player {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 15px;

    padding: 12px 18px;
    border-radius: 25px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 0 20px rgba(123,47,247,0.4);
}

/* play button */
.play-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;

    background: linear-gradient(45deg,#7b2ff7,#1e3c72);
    color: white;
    font-size: 16px;

    box-shadow: 0 0 10px #7b2ff7;
    transition: 0.2s;
}

.play-btn:hover {
    transform: scale(1.1);
}

/* volume */
.volume {
    appearance: none;
    width: 120px;
    height: 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    outline: none;
}

.volume::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7b2ff7;
    box-shadow: 0 0 10px #7b2ff7;
    cursor: pointer;
}

/* MOBILE */
@media(max-width:600px){
    .avatar {width:100px;height:100px;}
    .btn-img {width:65px;}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="intro" onclick="enterSite()">
<div class="intro-text">AY3ENT BIO</div>
</div>

<div class="main" id="main">

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent"><img src="twitch2.png" class="btn-img"></a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent"><img src="telegram.png" class="btn-img"></a>
<span class="btn-text">telegram</span>
</div>
</div>

</div>

<!-- 🎧 PLAYER -->
<div class="player">
<button class="play-btn" id="playBtn">▶</button>
<input type="range" min="0" max="1" step="0.01" value="0.5" id="volume" class="volume">
</div>

<audio id="music" loop src="music.mp3"></audio>
<audio id="clickSound" src="click.mp3"></audio>

</div>

<script>
let music = document.getElementById("music");
let clickSound = document.getElementById("clickSound");
let playBtn = document.getElementById("playBtn");
let volume = document.getElementById("volume");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";

setTimeout(()=>document.querySelector(".intro").remove(),1000);

clickSound.play();
music.play();
}

/* PLAY / PAUSE */
playBtn.onclick = () => {
if(music.paused){
music.play();
playBtn.innerHTML = "❚❚";
}else{
music.pause();
playBtn.innerHTML = "▶";
}
};

/* VOLUME */
volume.addEventListener("input", ()=>{
music.volume = volume.value;
});

/* CURSOR */
let cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX+"px";
cursor.style.top = e.clientY+"px";
});
</script>

</body>
</html>
