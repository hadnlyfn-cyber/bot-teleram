<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* КУРСОР */
.cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #7b2ff7;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px #7b2ff7;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: 1s;
}

.intro-text {
    color: white;
    font-size: 42px;
    text-shadow: 0 0 25px #7b2ff7;
}

/* MAIN */
.main {
    opacity: 0;
    transition: 1.5s;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -3;
}

/* BG */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR (КРУТИТСЯ) */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    box-shadow: 0 0 25px #7b2ff7;
    margin-bottom: 20px;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    from {transform: rotate(0);}
    to {transform: rotate(360deg);}
}

/* TEXT */
.typing {
    color: white;
    margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn-img {
    width: 90px;
    border-radius: 20px;
}

.btn-text {
    color: white;
    opacity: 0;
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
}

/* MOBILE */
@media(max-width:600px){
    .avatar {width: 100px;height:100px;}
    .btn-img {width:70px;}
}

/* VISUALIZER */
.visualizer {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
}

.bar {
    width: 3px;
    background: #7b2ff7;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="intro" onclick="enterSite()">
<div class="intro-text">AY3ENT BIO</div>
</div>

<div class="main" id="main">

<canvas id="canvas"></canvas>

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="typing" id="typing"></div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent"><img src="twitch2.png" class="btn-img"></a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent"><img src="telegram.png" class="btn-img"></a>
<span class="btn-text">telegram</span>
</div>
</div>

</div>

<div class="visualizer" id="visualizer"></div>

<audio id="music" loop src="music.mp3"></audio>
<audio id="clickSound" src="click.mp3"></audio>

</div>

<script>
let music = document.getElementById("music");
let clickSound = document.getElementById("clickSound");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>{document.querySelector(".intro").remove()},1000);

clickSound.play();
music.play();
}

/* КУРСОР */
let cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX+"px";
cursor.style.top = e.clientY+"px";
});

/* TYPING */
let text = ["ay3ent...", "streamer...", "dev..."];
let i=0,j=0;

function type(){
document.getElementById("typing").innerText = text[i].slice(0,j++);
if(j>text[i].length){
j=0;i=(i+1)%text.length;
}
setTimeout(type,120);
}
type();

/* PARTICLES + LINES */
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<70;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:1-2*Math.random(),vy:1-2*Math.random()});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#7b2ff7";
ctx.fill();

particles.forEach(p2=>{
let dx=p.x-p2.x;
let dy=p.y-p2.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<100){
ctx.strokeStyle="rgba(123,47,247,0.2)";
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);
ctx.stroke();
}
});
});

requestAnimationFrame(draw);
}
draw();

/* VISUALIZER */
let vis = document.getElementById("visualizer");
for(let i=0;i<30;i++){
let b=document.createElement("div");
b.className="bar";
vis.appendChild(b);
}

setInterval(()=>{
document.querySelectorAll(".bar").forEach(b=>{
b.style.height = (Math.random()*50)+"px";
});
},100);
</script>

</body>
</html>
