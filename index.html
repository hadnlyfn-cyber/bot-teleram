<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 999;
    transition: 1s;
}

.main {
    opacity: 0;
    transition: 1.5s;
}

/* BG */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 30px #7b2ff7;
}

/* VIEWS */
.views {
    color: #aaa;
    margin: 10px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* ADVANCED BUTTON */
.btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.btn {
    position: relative;
    padding: 10px;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.25s;
    transform-style: preserve-3d;
}

/* liquid effect */
.btn::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(123,47,247,0.4), transparent);
    top: -50%;
    left: -50%;
    opacity: 0;
    transition: 0.3s;
}

.btn:hover::before {
    opacity: 1;
}

.btn img {
    width: 55px;
    border-radius: 12px;
    position: relative;
    z-index: 2;
}

.btn-text {
    color: white;
    opacity: 0;
    transform: translateX(-10px);
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
    transform: translateX(0);
}

/* hover lift */
.btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 25px rgba(123,47,247,0.7);
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    padding: 15px;
    border-radius: 20px;
    background: rgba(20,20,20,0.8);
    backdrop-filter: blur(10px);
}

.play-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: none;
    background: #7b2ff7;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: block;
    margin: auto;
    transition: 0.2s;
}

.play-btn:hover {
    transform: scale(1.1);
}

/* progress */
.progress {
    width: 100%;
    margin-top: 10px;
}

.time {
    display: flex;
    justify-content: space-between;
    color: #aaa;
    font-size: 10px;
}
</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="main" id="main">

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="views" id="views">👁 0</div>

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" class="btn tilt">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" class="btn tilt">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

</div>

<!-- PLAYER -->
<div class="player">

<button id="playBtn" class="play-btn">▶</button>

<input type="range" id="progress" class="progress" value="0">

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

</div>

<script>
let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>document.querySelector(".intro").remove(),1000);
}

/* PLAYER */
playBtn.onclick = ()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

music.onloadedmetadata = ()=>{
document.getElementById("duration").innerText=format(music.duration);
};

music.ontimeupdate = ()=>{
progress.value=(music.currentTime/music.duration)*100;
document.getElementById("current").innerText=format(music.currentTime);
};

progress.oninput = ()=>{
music.currentTime=(progress.value/100)*music.duration;
};

function format(s){
let m=Math.floor(s/60);
let sec=Math.floor(s%60);
if(sec<10) sec="0"+sec;
return m+":"+sec;
}

/* TILT */
document.querySelectorAll(".tilt").forEach(el=>{
el.addEventListener("mousemove",e=>{
let r=el.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;
el.style.transform=`rotateX(${-(y/r.height-0.5)*15}deg) rotateY(${(x/r.width-0.5)*15}deg)`;
});
el.addEventListener("mouseleave",()=>el.style.transform="rotateX(0) rotateY(0)");
});
</script>

</body>
</html>
