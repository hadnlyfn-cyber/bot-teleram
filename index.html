<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: "Bungee", sans-serif;
}

/* ФОН */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ФОТО */
.avatar {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
    transition: 0.3s;
}

.avatar:hover {
    transform: scale(1.07);
    box-shadow: 0 0 50px #7b2ff7, 0 0 100px #7b2ff7;
}

/* КНОПКА МУЗЫКИ */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 10px #7b2ff7;
}
</style>

</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <a href="https://twitch.tv/ay3ent" target="_blank">
        <img src="photo.jpg" class="avatar">
    </a>
</div>

<!-- МУЗЫКА -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- КНОПКА -->
<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
let music = document.getElementById("music");
let isPlaying = false;

function toggleMusic() {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
    } else {
        music.play();
        isPlaying = true;
    }
}
</script>

</body>
</html>
