<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 999;
    transition: 1s;
}

.main {
    opacity: 0;
    transition: 1.5s;
}

/* BG */
.background {
    position: fixed;
    width: 110%;
    height: 110%;
    background: url('bg.gif') center/cover no-repeat;
    z-index: -2;
}

/* CONTENT */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* AVATAR */
.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 25px #7b2ff7;
}

/* VIEWS */
.views {
    color: #aaa;
    margin: 10px;
}

/* TEXT */
.typing {
    color: white;
    margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn {
    padding: 10px;
    border-radius: 18px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    transition: 0.2s;
}

.btn img {
    width: 55px;
    border-radius: 12px;
}

.btn-text {
    color: white;
    opacity: 0;
    transition: 0.3s;
}

.btn-row:hover .btn-text {
    opacity: 1;
}

/* PLAYER */
.player {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    padding: 15px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

.play-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: white;
    font-size: 18px;
    cursor: pointer;
}

.progress {
    width: 100%;
    margin-top: 10px;
}

.volume {
    width: 80px;
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="main" id="main">

<div class="background"></div>

<div class="container">

<img src="photo.jpg" class="avatar">

<div class="views" id="views">👁 0</div>

<div class="typing" id="typing"></div>

<div class="buttons">

<div class="btn-row">
<a href="https://twitch.tv/ay3ent" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>

</div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="controls">
<button id="playBtn" class="play-btn">▶</button>
<input type="range" id="volume" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<input type="range" id="progress" class="progress" value="0">

</div>

<audio id="music" src="music.mp3"></audio>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5YVBwTUnlCLzrZgxuoNhbkdEMDReOJKo",
  authDomain: "boty-b7a7f.firebaseapp.com",
  databaseURL: "https://boty-b7a7f-default-rtdb.firebaseio.com/",
  projectId: "boty-b7a7f",
  storageBucket: "boty-b7a7f.firebasestorage.app",
  messagingSenderId: "1011485229092",
  appId: "1:1011485229092:web:1d3e8c272845b36dcc18b1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const viewsRef = ref(db, "views");

get(viewsRef).then((snap)=>{
let count = snap.exists()?snap.val():0;
set(viewsRef, count + 1);
});

onValue(viewsRef, (snap)=>{
document.getElementById("views").innerText = "👁 " + snap.val();
});
</script>

<script>
let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
document.getElementById("main").style.opacity="1";
setTimeout(()=>document.querySelector(".intro").remove(),1000);
}

/* PLAYER */
playBtn.onclick = ()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

music.addEventListener("timeupdate", ()=>{
progress.value = (music.currentTime / music.duration)*100;
});

progress.oninput = ()=>{
music.currentTime = (progress.value/100)*music.duration;
};

volume.oninput = ()=>{
music.volume = volume.value;
};

/* TYPING */
let words=["ay3ent...","streamer...","developer..."];
let i=0,j=0;

function type(){
document.getElementById("typing").innerText = words[i].slice(0,j++);
if(j>words[i].length){
j=0;
i=(i+1)%words.length;
}
setTimeout(type,150);
}
type();
</script>

</body>
</html>
