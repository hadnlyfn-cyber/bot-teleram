<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:"Bungee",sans-serif;
cursor:none;
}

/* 🔥 НОВЫЙ CURSOR */
.cursor{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:white; /* ядро */
border:2px solid #7b2ff7; /* контраст */
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 15px #7b2ff7, 0 0 30px rgba(123,47,247,0.6);
z-index:9999;
}

.cursor-follower{
position:fixed;
width:40px;
height:40px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.4);
background:rgba(123,47,247,0.08);
backdrop-filter:blur(4px);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9998;
}

/* INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:999;
transition:1s;
}

/* BG */
.background{
position:fixed;
width:100%;
height:100%;
background:url('bg.gif') center/cover no-repeat;
z-index:-2;
}

/* GLASS */
.wrapper{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
height:80vh;
border-radius:30px;
background:rgba(20,20,20,0.45);
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(123,47,247,0.35);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:1.5s;
}

/* TEXT */
.typing{
color:white;
margin-bottom:10px;
height:20px;
}

/* AVATAR */
.avatar-wrap{
position:relative;
width:150px;
height:150px;
}

.avatar{
width:100%;
height:100%;
border-radius:50%;
z-index:2;
position:relative;
}

#circleVis{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* BUTTONS */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.btn-row{
display:flex;
align-items:center;
gap:10px;
}

.btn{
display:inline-flex;
padding:10px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
transition:0.25s;
text-decoration:none;
}

.btn img{
width:50px;
border-radius:10px;
}

.btn-text{
color:white;
opacity:0;
transform:translateX(-10px);
transition:0.3s;
}

.btn-row:hover .btn-text{
opacity:1;
transform:translateX(0);
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 20px #7b2ff7;
}

/* PLAYER */
.player{
position:absolute;
bottom:20px;
width:80%;
}

.play-btn{
width:60px;
height:60px;
border-radius:50%;
background:#7b2ff7;
color:white;
border:none;
margin:auto;
display:block;
}

/* PROGRESS */
.progress-container{
width:100%;
height:4px;
background:rgba(255,255,255,0.2);
margin-top:10px;
cursor:pointer;
}

#progressBar{
height:100%;
width:0%;
background:#7b2ff7;
}

/* VISUALIZER */
.visualizer{
width:100%;
height:50px;
margin-top:10px;
}

#audioVis{
width:100%;
height:100%;
}

/* TIME */
.time{
display:flex;
justify-content:space-between;
color:#aaa;
font-size:11px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>

<div class="intro" id="intro">
<h1 style="color:white;">AY3ENT BIO</h1>
</div>

<div class="background"></div>

<div class="wrapper" id="main">

<div id="typing" class="typing"></div>

<div class="avatar-wrap">
<canvas id="circleVis"></canvas>
<img src="photo.jpg" class="avatar">
</div>

<div id="views" style="color:#aaa;margin-top:10px;">👁 ...</div>

<div class="buttons">
<div class="btn-row">
<a href="https://twitch.tv/ay3ent" target="_blank" class="btn">
<img src="twitch2.png">
</a>
<span class="btn-text">twitch</span>
</div>

<div class="btn-row">
<a href="https://t.me/ay3ent" target="_blank" class="btn">
<img src="telegram.png">
</a>
<span class="btn-text">telegram</span>
</div>
</div>

<div class="player">
<button id="playBtn" class="play-btn">▶</button>

<div class="progress-container" id="progressContainer">
<div id="progressBar"></div>
</div>

<div class="visualizer">
<canvas id="audioVis"></canvas>
</div>

<div class="time">
<span id="current">0:00</span>
<span id="duration">0:00</span>
</div>
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<script>
/* COUNTAPI */
fetch("https://api.countapi.xyz/hit/ay3ent-bio/views")
.then(r=>r.json())
.then(d=>views.innerText="👁 "+d.value);

/* CURSOR FIX */
let cur=document.getElementById("cursor");
let fol=document.getElementById("cursorFollower");

let x=0,y=0,fx=0,fy=0;

document.addEventListener("mousemove",e=>{
x=e.clientX;y=e.clientY;
cur.style.left=x+"px";
cur.style.top=y+"px";
});

function animate(){
fx+=(x-fx)*0.15;
fy+=(y-fy)*0.15;
fol.style.left=fx+"px";
fol.style.top=fy+"px";
requestAnimationFrame(animate);
}
animate();

/* дальше код музыки, визуализатора и typing НЕ ТРОГАЛ */
</script>

</body>
</html>
