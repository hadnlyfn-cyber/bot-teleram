<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Bungee", sans-serif;
}

/* INTRO */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    cursor: pointer;
    transition: 1s;
}

.intro-text {
    color: white;
    font-size: 42px;
    text-shadow: 0 0 30px #7b2ff7;
}

/* UI OVERLAY */
.ui {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* CENTER UI */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: auto;
    text-align: center;
}

.avatar {
    width: 140px;
    border-radius: 50%;
    box-shadow: 0 0 30px #7b2ff7;
    margin-bottom: 15px;
}

.typing {
    color: white;
    margin-bottom: 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn img {
    width: 90px;
    border-radius: 20px;
    transition: 0.2s;
}

.btn img:hover {
    transform: scale(1.1);
}

/* PLAYER */
.player {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    padding: 10px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    pointer-events: auto;
}

.play-btn {
    width: 40px;
    height: 40px;
}

</style>
</head>

<body>

<div class="intro" onclick="enterSite()">
<div class="intro-text">AY3ENT BIO</div>
</div>

<div id="scene"></div>

<div class="ui">

<div class="center">
<img src="photo.jpg" class="avatar">

<div class="typing" id="typing"></div>

<div class="buttons">
<a href="https://twitch.tv/ay3ent" class="btn"><img src="twitch2.png"></a>
<a href="https://t.me/ay3ent" class="btn"><img src="telegram.png"></a>
</div>
</div>

<div class="player">
<button id="playBtn">▶</button>
<input type="range" id="volume" min="0" max="1" step="0.01">
</div>

</div>

<audio id="music" src="music.mp3"></audio>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, sphere;

/* INIT 3D */
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("scene").appendChild(renderer.domElement);

/* LIGHT */
let light = new THREE.PointLight(0x7b2ff7, 2);
light.position.set(2,2,5);
scene.add(light);

/* OBJECT */
let geometry = new THREE.SphereGeometry(1.5, 64, 64);
let material = new THREE.MeshStandardMaterial({
color: 0x7b2ff7,
wireframe: true
});
sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

/* ANIMATE */
function animate(){
requestAnimationFrame(animate);
sphere.rotation.y += 0.01;
renderer.render(scene, camera);
}
animate();

/* PARALLAX CAMERA */
document.addEventListener("mousemove", e=>{
let x = (e.clientX/window.innerWidth - 0.5)*2;
let y = (e.clientY/window.innerHeight - 0.5)*2;
camera.position.x = x;
camera.position.y = -y;
});

/* ENTER */
function enterSite(){
document.querySelector(".intro").style.opacity="0";
setTimeout(()=>document.querySelector(".intro").remove(),1000);
}

/* AUDIO */
let music = document.getElementById("music");
let playBtn = document.getElementById("playBtn");
let volume = document.getElementById("volume");

playBtn.onclick=()=>{
if(music.paused){
music.play();
playBtn.innerHTML="❚❚";
}else{
music.pause();
playBtn.innerHTML="▶";
}
};

volume.oninput=()=>music.volume=volume.value;

/* TYPING */
let words=["ay3ent...","streamer...","developer..."];
let i=0,j=0;

function type(){
document.getElementById("typing").innerText=words[i].slice(0,j++);
if(j>words[i].length){
j=0;i=(i+1)%words.length;
}
setTimeout(type,200);
}
type();
</script>

</body>
</html>
