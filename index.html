<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AY3ENT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Bungee", sans-serif;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 40px rgba(123,47,247,0.5);
}

.title {
    color: white;
    font-size: 32px;
    margin-bottom: 30px;
    text-shadow: 0 0 10px #7b2ff7, 0 0 20px #7b2ff7;
}

.btn {
    display: block;
    margin: 15px auto;
    padding: 15px 40px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 18px;
    background: linear-gradient(45deg, #7b2ff7, #0f2027);
    box-shadow: 0 0 10px #7b2ff7;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
}
</style>

</head>
<body>

<div class="container">
    <div class="title">🖤 AY3ENT</div>

    <a class="btn" href="https://twitch.tv/ay3ent">🎮 Twitch</a>
    <a class="btn" href="https://t.me/ay3ent">✈️ Telegram</a>
</div>

</body>
</html>
